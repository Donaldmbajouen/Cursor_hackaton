services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: votechain
      POSTGRES_PASSWORD: votechain
      POSTGRES_DB: votechain
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votechain -d votechain"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - votechain-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - votechain-net

  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://votechain:votechain@postgres:5432/votechain
      REDIS_URL: redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - votechain-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Évite que `npm install` dans le conteneur (root) pollue node_modules sur l’hôte (EACCES / React cassé)
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - votechain-net

networks:
  votechain-net:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
